define host {
  host_name                      desktop
  alias                          desktop
  address                        192.168.122.1
  use                            linux-server
}

define service {
  service_description            Immich HTTPS
  host_name                      desktop
  use                            remote-service
  check_command                  check_http!--ssl -H immich.simon816.com
}

define service {
  service_description            Daily backup
  host_name                      desktop
  use                            local-service
  check_command                  check_file_age!/var/lib/state/desktop-backup.stamp!108000!129600
}
